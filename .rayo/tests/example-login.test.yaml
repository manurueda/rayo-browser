name: Login Flow Example
viewport:
  width: 1280
  height: 720
setup:
  - navigate: https://app.example.com
steps:
  - name: Fill login form
    batch:
      - { action: type, selector: "input[name='email']", value: "test@example.com" }
      - { action: type, selector: "input[name='password']", value: "password123" }
      - { action: click, selector: "button[type='submit']" }
  - name: Verify dashboard loaded
    wait:
      selector: ".dashboard"
      timeout_ms: 5000
    assert:
      - page_map_contains:
          text: Welcome
      - screenshot:
          name: dashboard
          threshold: 0.02
