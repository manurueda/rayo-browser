<div id="live-steps" hx-swap-oob="beforeend">
<div class="flex items-center gap-2 px-4 py-2 border-b border-gray-100 dark:border-gray-800/50">
  {% if step.pass %}
  <span class="text-green-500 text-sm">&#10003;</span>
  {% else %}
  <span class="text-red-500 text-sm">&#10007;</span>
  {% endif %}
  <span class="text-sm">{{ step.name }}</span>
  <span class="text-xs text-gray-400 ml-auto">{{ step.duration_ms }}ms</span>
</div>
</div>
