<!DOCTYPE html>
<html>
<head>
  <title>Visual Test Fixture</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #fff; }
    h1 { color: #333; }
    .hero { background: #4a90d9; color: white; padding: 40px; border-radius: 8px; margin: 20px 0; }
    .btn { background: #e74c3c; color: white; border: none; padding: 12px 24px; border-radius: 4px; cursor: pointer; font-size: 16px; }
    .btn:hover { background: #c0392b; }
    .card { border: 1px solid #ddd; padding: 20px; border-radius: 8px; margin: 10px 0; }
    input[type="text"], input[type="email"] { padding: 8px 12px; border: 1px solid #ccc; border-radius: 4px; width: 200px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin: 20px 0; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    .animated { animation: pulse 2s infinite; }
  </style>
</head>
<body>
  <h1>Visual Test Page</h1>
  <p>This page is used for visual regression testing.</p>

  <div class="hero">
    <h2>Hero Section</h2>
    <p>A prominent section for visual testing.</p>
    <button class="btn" onclick="alert('clicked')">Call to Action</button>
  </div>

  <div class="grid">
    <div class="card">
      <h3>Card 1</h3>
      <p>First card content.</p>
    </div>
    <div class="card">
      <h3>Card 2</h3>
      <p>Second card content.</p>
    </div>
    <div class="card">
      <h3>Card 3</h3>
      <p>Third card content.</p>
    </div>
  </div>

  <form>
    <label for="name">Name:</label>
    <input type="text" id="name" name="name" placeholder="Enter your name">
    <label for="email">Email:</label>
    <input type="email" id="email" name="email" placeholder="you@example.com">
    <button type="submit" class="btn">Submit</button>
  </form>

  <div class="animated">
    <p>This text has a pulse animation (should be frozen during visual tests).</p>
  </div>
</body>
</html>
